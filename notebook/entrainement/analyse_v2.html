
<h2 class="sr-only">Analyse des prédictions de sentiment sur les commentaires Reddit</h2>

<div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem;">
  <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem; text-align: center;">
    <div style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 4px;">Commentaires</div>
    <div style="font-size: 24px; font-weight: 500;">12373</div>
  </div>
  <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem; text-align: center;">
    <div style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 4px;">Positifs</div>
    <div style="font-size: 24px; font-weight: 500; color: #3B6D11;">56.5%</div>
  </div>
  <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem; text-align: center;">
    <div style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 4px;">Négatifs</div>
    <div style="font-size: 24px; font-weight: 500; color: #A32D2D;">43.5%</div>
  </div>
  <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem; text-align: center;">
    <div style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 4px;">Cas incertains</div>
    <div style="font-size: 24px; font-weight: 500; color: #BA7517;">20.2%</div>
  </div>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
  <div>
    <div style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 8px;">Distribution des prédictions</div>
    <div style="position: relative; width: 100%; height: 220px;">
      <canvas id="chart1" role="img" aria-label="Diagramme en secteurs :">56.5% positifs, 43.5% négatifs</canvas>
    </div>
  </div>
  <div>
    <div style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 8px;">Distribution du score de confiance</div>
    <div style="position: relative; width: 100%; height: 220px;">
      <canvas id="chart2" role="img" aria-label="Histogramme du score de sentiment entre 0 et 1">Distribution du score de sentiment</canvas>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
new Chart(document.getElementById('chart1'), {
  type: 'doughnut',
  data: {
    labels: ['Positif (56.5%)', 'Négatif (43.5%)'],         // * TODO : ajouter les cas incertains
    datasets: [{
      data: [8674, 3559],
      backgroundColor: ['#639922', '#E24B4A'],
      borderWidth: 0
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { position: 'bottom', labels: { font: { size: 12 }, padding: 12 } } }
  }
});

new Chart(document.getElementById('chart2'), {
  type: 'bar',
  data: {
    labels: ['0-0.1','0.1-0.2','0.2-0.3','0.3-0.4','0.4-0.5','0.5-0.6','0.6-0.7','0.7-0.8','0.8-0.9','0.9-1.0'],
    datasets: [{
      label: 'Nb de commentaires',
      data: [756, 1107, 1173, 1216, 1126, 1379, 1320, 1355, 1428, 1513],
      backgroundColor: (ctx) => {
        const i = ctx.dataIndex;
        return i < 4 ? '#E24B4A' : i < 6 ? '#EF9F27' : '#639922';
      },
      borderWidth: 0
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { font: { size: 10 }, autoSkip: false, maxRotation: 45 } },
      y: { ticks: { font: { size: 11 } } }
    }
  }
});
</script>
